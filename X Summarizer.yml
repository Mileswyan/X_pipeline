                        company.
                      type: number
                    reasoning:
                      description: reasoning of the statement
                      type: string
                    sentiment:
                      description: the negative to positive tone toward the company.
                      type: number
                    statement:
                      description: statement of the ticker
                      type: string
                    symbol:
                      description: ticker
                      type: string
                  required:
                  - symbol
                  - statement
                  - reasoning
                  - confidence
                  - sentiment
                  type: object
                type: array
            required: []
            type: object
