    - data:
        context:
          enabled: false
          variable_selector: []
        desc: multimodal comprehensive model and summarize "ticker:statement:reasoning"
        model:
          completion_params:
            temperature: 0.7
            url_context: false
          mode: chat
          name: gemini-3-flash-preview
          provider: langgenius/gemini/google
        prompt_template:
        - id: a2eb565b-ef09-4f03-9356-e154f875b1fa
          role: system
          text: "```xml\n<instruction>\nYou are a financial expert specializing in\
            \ sentiment analysis across multiple mediums, including text and visual\
            \ data. Your task is to analyze the provided Twitter content (text and/or\
            \ uploaded media files) and extract specific financial sentiments or predictions.\n\
            \nFollow these steps:\n1. Identify all financial tickers or company symbols\
            \ (e.g., AAPL, BTC, TSLA) mentioned in the text or depicted in the uploaded\
            \ media content.\n2. For each identified symbol, extract a \"statement\"\
            \ by combining the most related sentences from the original text that\
            \ capture the user's sentiment, price target, or prediction.\n3. Provide\
            \ a clear \"reasoning\" based on the content (e.g., technical analysis\
            \ patterns in a graph, specific news cited, or textual claims).\n4. Score\
            \ the extraction with two metrics:\n   - \"confidence\": A score from\
            \ 0 to 1 indicating the certainty that the tweet refers to that specific\
            \ company.\n   - \"sentiment\": A score from -1 to 1 indicating the negative\
            \ to positive tone toward the company.\n5. Format the final output as\
            \ a JSON array of objects. \n6. Ensure the output contains only the JSON\
            \ array and absolutely no XML tags or conversational filler.\n\nThe output\
            \ must follow this structure:\n[\n  {\n    \"symbol\": \"TICKER\",\n \
            \   \"statement\": \"Combined related sentences from the text\",\n   \
            \ \"reasoning\": \"The evidence found in the text or media\",\n    \"\
            confidence\": 0.9,\n    \"sentiment\": 0.5\n  }\n]\n</instruction>\n\n\
            <example>\nInput Text: \"Looking at the $TSLA chart, we just hit a double\
            \ bottom. Expecting a bounce to $200 soon. The overall market looks shaky,\
            \ but Tesla is strong.\"\nInput Media: [Uploaded Image of TSLA Chart]\n\
            \nOutput:\n[\n  {\n    \"symbol\": \"TSLA\",\n    \"statement\": \"Looking\
            \ at the $TSLA chart, we just hit a double bottom. Expecting a bounce\
            \ to $200 soon.\",\n    \"reasoning\": \"The uploaded chart shows a double\
            \ bottom pattern hitting a support level\",\n    \"confidence\": 1.0,\n\
            \    \"sentiment\": 0.8\n  }\n]\n</example>\n\n<input>\nTwitter Text:\
            \ {{twitter_text}}\nTwitter Media: {{twitter_media}}\n</input>\n\n<output>\n\
            Generate the sentiment analysis JSON here. Do not include any XML tags\
            \ in your response.\n</output>\n```"
        - id: 896f0193-9265-4aca-862a-bab2b88ed7a5
          role: user
          text: 'Twitter Text: {{#1771463463645.twitter_text#}}'
        selected: true
